<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개인 홈페이지</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 60px 40px;
            text-align: center;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 60px;
            font-weight: bold;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .title {
            color: #667eea;
            font-size: 1.2em;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .bio {
            color: #666;
            font-size: 1em;
            line-height: 1.8;
            margin-bottom: 40px;
        }

        .skills {
            background: #f8f9ff;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: left;
        }

        .skills h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .skill-tag {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            margin: 5px;
            font-size: 0.9em;
        }

        .links {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .link-btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: 500;
        }

        .link-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .footer {
            color: #999;
            font-size: 0.9em;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 25px;
            }

            h1 {
                font-size: 2em;
            }

            .title {
                font-size: 1em;
            }

            .skills {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-img">👤</div>
        
        <h1>이름을 입력하세요</h1>
        <div class="title">직업 / 직함을 입력하세요</div>
        
        <p class="bio">
            자신에 대한 간단한 소개를 작성하세요.
            <br>
            이곳에 당신의 경험, 관심사, 목표 등을 자유롭게 표현해보세요.
        </p>

        <div class="skills">
            <h2>📚 기술 & 스킬</h2>
            <span class="skill-tag">HTML</span>
            <span class="skill-tag">CSS</span>
            <span class="skill-tag">JavaScript</span>
            <span class="skill-tag">Python</span>
            <span class="skill-tag">Git</span>
        </div>

        <div class="links">
            <a href="https://github.com/camnara" class="link-btn">GitHub</a>
            <a href="mailto:your-email@example.com" class="link-btn">Email</a>
            <a href="#" class="link-btn">LinkedIn</a>
            <a href="#" class="link-btn">블로그</a>
        </div>

        <div class="footer">
            <p>© 2026 All Rights Reserved</p>
        </div>
    </div>
</body>
</html>
